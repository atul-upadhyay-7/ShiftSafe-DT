name: 🏷️ Auto Label PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: read
  issues: write
  contents: read

jobs:
  label:
    name: 🏷️ Auto Label
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Label PR by files changed
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const labels = new Set();

            for (const file of files) {
              const path = file.filename;
              
              if (path.startsWith('src/app/api/')) labels.add('api');
              if (path.endsWith('.tsx') || path.endsWith('.css')) labels.add('ui');
              if (path.startsWith('ai-engine/')) labels.add('ai/ml');
              if (path.startsWith('.github/')) labels.add('ci/cd');
              if (path.startsWith('src/lib/')) labels.add('core-logic');
              if (path === 'package.json' || path === 'package-lock.json') labels.add('dependencies');
              if (path.endsWith('.md')) labels.add('documentation');
              if (path.startsWith('src/app/') && path.endsWith('page.tsx')) labels.add('pages');
            }

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [...labels],
              });
            }
