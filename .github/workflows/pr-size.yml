name: 📊 PR Size Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: read
  issues: write

jobs:
  size-check:
    name: 📊 PR Size
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const additions = pr.additions;
            const deletions = pr.deletions;
            const total = additions + deletions;

            let label = '';
            let emoji = '';

            if (total < 50) { label = 'size/XS'; emoji = '🟢'; }
            else if (total < 200) { label = 'size/S'; emoji = '🟡'; }
            else if (total < 500) { label = 'size/M'; emoji = '🟠'; }
            else if (total < 1000) { label = 'size/L'; emoji = '🔴'; }
            else { label = 'size/XL'; emoji = '🔥'; }

            // Remove old size labels
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const l of labels) {
              if (l.name.startsWith('size/')) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: l.name,
                });
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label],
            });

            if (total > 500) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `${emoji} **Large PR detected** (+${additions}/-${deletions} = ${total} changes)\n\nConsider breaking this into smaller, focused PRs for easier review.`,
              });
            }
