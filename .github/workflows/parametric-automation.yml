name: ShiftSafe Parametric Automation Pipeline

on:
  schedule:
    # Runs at minute 0 past every hour (e.g., 1:00, 2:00, 3:00)
    - cron: '0 * * * *'
  
  # Allow manual triggering from the GitHub Actions tab for testing
  workflow_dispatch: 

jobs:
  trigger-oracles-and-payouts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check Real-Time Weather & Trigger Auto-Payouts
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Gracefully skip if secrets are not configured on this repo
          if [ -z "$PROD_URL" ]; then
            echo "⚠️  PROD_URL not set — skipping automation (expected on forks without secrets)."
            exit 0
          fi

          # Sanitize URL — strip all whitespace
          CLEAN_URL=$(printf '%s' "$PROD_URL" | tr -d '[:space:]')

          echo "================================================"
          echo " ShiftSafe Zero-Touch Automation Engine"
          echo " Target: $CLEAN_URL"
          echo "================================================"

          # Step 1: Try secured CRON endpoint first (requires matching CRON_SECRET in Vercel)
          echo ""
          echo "🔐 Attempting secured CRON endpoint..."
          CLEAN_SECRET=$(printf '%s' "${CRON_SECRET:-dev_secret_override_for_local}" | tr -d '\n\r\t')
          
          cron_response=$(curl -L --write-out "%{http_code}" --silent --output cron_out.txt \
            "$CLEAN_URL/api/triggers/cron" \
            -H "Authorization: Bearer $CLEAN_SECRET" \
            -H "Content-Type: application/json")

          if [ "$cron_response" -eq 200 ]; then
            echo "✅ CRON automation triggered — zero-touch payouts processed!"
            cat cron_out.txt
            exit 0
          else
            echo "⚠️  CRON endpoint returned $cron_response — falling back to oracle check..."
          fi

          # Step 2: Fallback — Hit the /api/triggers endpoint which checks LIVE weather APIs
          # This endpoint is confirmed working and calls OpenWeatherMap + AQICN in real time
          echo ""
          echo "🌦️  Querying live weather oracles (OpenWeatherMap + AQICN)..."
          
          trigger_response=$(curl -L --write-out "%{http_code}" --silent --output trigger_out.txt \
            -X POST "$CLEAN_URL/api/triggers" \
            -H "Content-Type: application/json" \
            -d '{"triggerType":"auto","zone":"Andheri West","city":"Mumbai","workerId":"auto"}')

          echo "Oracle Response: HTTP $trigger_response"
          cat trigger_out.txt

          if [ "$trigger_response" -eq 200 ]; then
            triggered=$(cat trigger_out.txt | grep -o '"triggeredCount":[0-9]*' | head -1)
            echo ""
            echo "✅ Oracle sweep complete — $triggered parametric events evaluated."
            echo "   Live OpenWeatherMap + AQICN data processed successfully."
            exit 0
          else
            echo "❌ Oracle check failed. HTTP Status: $trigger_response"
            exit 1
          fi
